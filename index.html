<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Motívate con Dola ✨</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff9800">
    <style>
        * { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; box-sizing: border-box; }
        /* ✅ SOLO CAMBIAMOS LOS COLORES, EL RESTO DEL DISEÑO SE MANTIENE IGUAL */
        body { background: linear-gradient(135deg, #121212, #1e1e1e); min-height: 100vh; padding: 20px; text-align: center; color: #f5f5f5; }
        .contenedor { max-width: 450px; margin: 0 auto; }
        h1 { color: #ff9800; font-size: 28px; margin-bottom: 20px; }
        .mensaje { background: #1a1a1a; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(255,152,0,0.2); margin-bottom: 20px; font-size: 19px; color: #f0f0f0; line-height: 1.6; border: 1px solid #333; }
        .seccion { background: rgba(255,152,0,0.05); padding: 18px; border-radius: 15px; margin-bottom: 15px; text-align: left; border: 1px solid #333; }
        .seccion h3 { color: #ffb74d; margin-bottom: 12px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 6px 0; border: 2px solid #ff9800; border-radius: 10px; font-size: 15px; background: #222; color: #fff; }
        .boton { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 15px; font-size: 17px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .boton:hover { transform: translateY(-2px); }
        .agregar { background: #ff9800; color: #121212; }
        .confirmar { background: #ffb74d; color: #121212; }
        .limpiar { background: #ffcc80; color: #121212; }
        .estudiar { background: #ff9800; color: #121212; }
        .ejercicio { background: #ffb74d; color: #121212; }
        .comer { background: #ffcc80; color: #121212; }
        .duchar { background: #ff9800; color: #121212; }
        .tareas { background: #ffb74d; color: #121212; }
        .descanso { background: #ffcc80; color: #121212; }
        .personalizado { background: #333; color: #ff9800; border: 1px solid #ff9800; }
        .horario-item { background: #1a1a1a; padding: 12px; border-radius: 10px; margin: 8px 0; border-left: 4px solid #ff9800; display: flex; justify-content: space-between; align-items: center; }
        .btn-eliminar { background: #ff5252; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .estado { margin-top: 15px; font-size: 15px; color: #ffcc80; font-weight: bold; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>✨ Motívate con Dola ✨</h1>
        <div class="mensaje" id="cajaMensaje">
            ¡Hola! 🥰 Elige cómo quieres que te acompañe, y empecemos 💖
        </div>

        <!-- ELECCIÓN DEL TRATO -->
        <div class="seccion">
            <h3>🎙️ ¿Cómo prefieres que te hable?</h3>
            <select id="tipoTrato">
                <option value="mujer">👩‍❤️‍👩 Como amiga: mi amor, vamos juntas</option>
                <option value="hombre">👨‍❤️‍👨 Como amigo: bro, vamos juntos</option>
            </select>
            <button class="boton confirmar" onclick="aplicarTrato()">✅ Elegir y empezar</button>
        </div>

        <!-- SECCIÓN DE HORARIOS -->
        <div class="seccion">
            <h3>📅 Agregar recordatorio</h3>
            <input type="time" id="horaRecordatorio" placeholder="Hora">
            <select id="tipoTarea">
                <option value="limpiar">🧺 Ordenar / Limpiar</option>
                <option value="estudiar">📚 Estudiar / Repasar</option>
                <option value="ejercicio">🏃 Hacer ejercicio</option>
                <option value="comer">🍽️ Comer / Preparar comida</option>
                <option value="duchar">🚿 Ducharse / Arreglarse</option>
                <option value="tareas">💻 Trabajo / Proyectos</option>
                <option value="descanso">💆 Descansar / Relajarse</option>
                <option value="otro">💬 Otra cosa</option>
            </select>
            <button class="boton agregar" onclick="agregarRecordatorio()">➕ Agregar al horario</button>
        </div>

        <div class="seccion">
            <h3>📋 Mi horario</h3>
            <div id="listaHorario">
                <p style="text-align:center; color:#888;">Aún no tienes recordatorios 💖</p>
            </div>
        </div>

        <h3 style="color:#ffb74d; margin:15px 0;">⚡ Empujoncito rápido</h3>
        <button class="boton limpiar" onclick="darMotivacion('limpiar')">🧺 Ordenar / Limpiar</button>
        <button class="boton estudiar" onclick="darMotivacion('estudiar')">📚 Estudiar / Repasar</button>
        <button class="boton ejercicio" onclick="darMotivacion('ejercicio')">🏃 Hacer ejercicio</button>
        <button class="boton personalizado" onclick="darMotivacion('otro')">💬 Otra cosa</button>

        <div class="estado" id="estadoVoz"></div>
    </div>

    <script>
        // ✅ TODO TU CÓDIGO ORIGINAL SE MANTIENE INTACTO, NO SE MODIFICÓ NINGUNA FUNCIÓN
        let trato = localStorage.getItem('tratoDola') || 'mujer';
        let horario = JSON.parse(localStorage.getItem('horarioDola')) || [];
        let intervaloVerificacion;

        // MENSAJES SEGÚN LA OPCIÓN ELEGIDA
        const textos = {
            mujer: {
                saludo: "¡Hola mi vida! Qué alegría estar contigo. Todo está bien, vamos a hacerlo muy bien juntas, paso a paso. No tienes que hacerlo sola, yo te acompaño en todo. ¡Tú puedes con todo! 💖",
                limpiar: "¿Qué pasó mi amor? No te preocupes, vamos despacito. Es hora de ordenar, levántate sin miedo, lo hacemos juntas. ¡Tú puedes! 💪✨",
                estudiar: "Ánimo mi corazón. Sé que cansa, pero recuerda tu sueño. Solo empieza poquito a poco, yo estoy aquí contigo. ¡Eres muy capaz! 💖",
                ejercicio: "Vamos mi preciosa. Sé que da pereza, pero te sentirás genial después. Mueve el cuerpo despacito, ¡tú puedes lograrlo! 🤗",
                comer: "Mi vida, es hora de comer rico. Aliméntate bien, te lo mereces mucho. ¡Vamos! 💖",
                duchar: "Es hora de cuidarte amiga. Entra al baño, relájate y sal sintiéndote hermosa. ✨",
                tareas: "Vamos talentosa. Sé que cansa, pero mira todo lo que haces bien. Empieza despacito, aquí te ayudo. 💪",
                descanso: "Amiga, descansar no es perder tiempo. Relájate, te lo mereces muchísimo. 💖",
                otro: "Sea lo que sea, no estás sola. Respira profundo y vamos juntas. ¡Estoy muy orgullosa de ti! ✨"
            },
            hombre: {
                saludo: "¡Qué tal amigo! Un gusto estar contigo. Todo va a salir muy bien, vamos a hacerlo juntos paso a paso. No tienes que hacerlo solo, aquí te apoyo en todo. ¡Tú puedes con todo! 💪",
                limpiar: "¿Qué pasa bro? Tranquilo, vamos despacio. Es hora de ordenar, anímate que lo hacemos juntos. ¡Tú puedes! ✨",
                estudiar: "Ánimo campeón. Sé que cuesta, pero recuerda por qué empezaste. Solo empieza poco a poco, aquí estoy contigo. ¡Eres muy capaz! 💯",
                ejercicio: "Vamos amigo. Sé que da pereza, pero te vas a sentir excelente. Mueve el cuerpo despacito, ¡tú puedes lograrlo! 🤜🤛",
                comer: "Es hora de comer bien amigo. Aliméntate rico, te lo mereces. ¡Vamos! 💪",
                duchar: "Es hora de cuidarte bro. Entra al baño, relájate y sal renovado. ✨",
                tareas: "Vamos crack. Sé que cansa, pero mira todo lo que sabes hacer. Empieza despacito, aquí te ayudo. 💪",
                descanso: "Amigo, descansar es necesario. Relájate un rato, te lo has ganado. 💯",
                otro: "Sea lo que sea, no vas solo. Respira profundo y vamos juntos. ¡Estoy muy orgulloso de ti! ✨"
            }
        };

        // Función para hablar
        function hablar(texto) {
            const estado = document.getElementById('estadoVoz');
            if ('speechSynthesis' in window) {
                estado.textContent = "🎙️ Hablando...";
                speechSynthesis.cancel();
                const voz = new SpeechSynthesisUtterance(texto);
                voz.lang = 'es-ES';
                voz.rate = 0.95;
                voz.pitch = trato === 'mujer' ? 1.1 : 0.95;
                voz.onend = () => estado.textContent = "✅ Listo, aquí sigo contigo 💖";
                speechSynthesis.speak(voz);
            } else {
                estado.textContent = "⚠️ Lee el mensaje con todo el cariño 💖";
            }
        }

        // Cambiar y guardar el trato
        function aplicarTrato() {
            trato = document.getElementById('tipoTrato').value;
            localStorage.setItem('tratoDola', trato);
            document.getElementById('cajaMensaje').textContent = textos[trato].saludo;
            hablar(textos[trato].saludo);
        }

        // Mostrar horario guardado
        function mostrarHorario() {
            const lista = document.getElementById('listaHorario');
            if (horario.length === 0) {
                lista.innerHTML = '<p style="text-align:center; color:#888;">Aún no tienes recordatorios 💖</p>';
                return;
            }
            lista.innerHTML = '';
            horario.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'horario-item';
                div.innerHTML = `
                    <span><strong>${item.hora}</strong> - ${item.nombre}</span>
                    <button class="btn-eliminar" onclick="eliminar(${i})">✕</button>
                `;
                lista.appendChild(div);
            });
        }

        // Agregar recordatorio
        function agregarRecordatorio() {
            const hora = document.getElementById('horaRecordatorio').value;
            const tipo = document.getElementById('tipoTarea').value;
            const nombre = document.getElementById('tipoTarea').selectedOptions[0].text;
            if (!hora) { alert('Pon la hora por favor 💖'); return; }
            horario.push({ hora, tipo, nombre });
            horario.sort((a,b) => a.hora.localeCompare(b.hora));
            localStorage.setItem('horarioDola', JSON.stringify(horario));
            mostrarHorario();
            alert('¡Listo! Te avisaré a esa hora 💖');
        }

        // Eliminar recordatorio
        function eliminar(i) {
            horario.splice(i, 1);
            localStorage.setItem('horarioDola', JSON.stringify(horario));
            mostrarHorario();
        }

        // Verificar alarmas
        function verificar() {
            const ahora = new Date().toTimeString().slice(0,5);
            horario.forEach(item => {
                if (item.hora === ahora) {
                    darMotivacion(item.tipo);
                    if (Notification.permission === 'granted') {
                        new Notification('✨ Motívate con Dola', { body: `¡Es hora! ${item.nombre}` });
                    }
                }
            });
        }

        // Motivar
        function darMotivacion(tarea) {
            const texto = textos[trato][tarea];
            document.getElementById('cajaMensaje').textContent = texto;
            hablar(texto);
        }

        // Iniciar al abrir la app
        if (Notification.permission !== 'granted') Notification.requestPermission();
        document.getElementById('tipoTrato').value = trato;
        mostrarHorario();
        hablar(textos[trato].saludo);
        intervaloVerificacion = setInterval(verificar, 60000);
    </script>
</body>
</html>
